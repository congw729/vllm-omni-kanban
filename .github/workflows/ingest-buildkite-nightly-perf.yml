# Ingest perf JSON from Buildkite after vllm-omni nightly dispatches this event.
name: Ingest Buildkite nightly perf

on:
  repository_dispatch:
    types: [buildkite_nightly_perf]
  workflow_dispatch:
    inputs:
      build_number:
        description: Buildkite build number (UI)
        required: true
        type: string
      org_slug:
        description: Buildkite organization slug
        required: false
        type: string
      pipeline_slug:
        description: Buildkite pipeline slug
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: ingest-nightly-perf-${{ github.repository }}
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve Buildkite coordinates
        id: coords
        run: |
          BN="${{ github.event.client_payload.build_number || github.event.inputs.build_number }}"
          ORG="${{ github.event.client_payload.org_slug || github.event.inputs.org_slug || env.BK_ORG }}"
          PIPE="${{ github.event.client_payload.pipeline_slug || github.event.inputs.pipeline_slug || env.BK_PIPE }}"
          COMMIT="${{ github.event.client_payload.commit || '' }}"
          BURL="${{ github.event.client_payload.build_url || '' }}"
          echo "build_number=$BN" >> "$GITHUB_OUTPUT"
          echo "org=$ORG" >> "$GITHUB_OUTPUT"
          echo "pipeline=$PIPE" >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "build_url=$BURL" >> "$GITHUB_OUTPUT"
          if [ -z "$BN" ]; then echo "Missing build number"; exit 1; fi
          if [ -z "$ORG" ] || [ -z "$PIPE" ]; then echo "Set BUILDKITE_ORG / BUILDKITE_PIPELINE secrets or pass via dispatch payload."; exit 1; fi
        env:
          BK_ORG: ${{ secrets.BUILDKITE_ORG }}
          BK_PIPE: ${{ secrets.BUILDKITE_PIPELINE_SLUG }}

      - name: Fetch perf JSON from Buildkite
        env:
          BUILDKITE_API_TOKEN: ${{ secrets.BUILDKITE_API_TOKEN }}
          BUILDKITE_ORG: ${{ steps.coords.outputs.org }}
          BUILDKITE_PIPELINE: ${{ steps.coords.outputs.pipeline }}
        run: |
          python scripts/fetch_buildkite_perf_json.py \
            --org "${{ steps.coords.outputs.org }}" \
            --pipeline "${{ steps.coords.outputs.pipeline }}" \
            --build "${{ steps.coords.outputs.build_number }}" \
            --output-dir "${{ runner.temp }}/perf_json"

      - name: Ingest into data/results
        run: |
          python scripts/ingest_nightly_perf_json.py \
            --input-dir "${{ runner.temp }}/perf_json" \
            --commit "${{ steps.coords.outputs.commit }}" \
            --build-url "${{ steps.coords.outputs.build_url }}" \
            --build-number "${{ steps.coords.outputs.build_number }}"

      - name: Commit and push
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/results/
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "chore(data): ingest nightly perf build ${{ steps.coords.outputs.build_number }}"
            git push
          fi

      - name: Deploy MkDocs (optional)
        if: hashFiles('mkdocs.yml') != ''
        run: |
          pip install -r requirements.txt 2>/dev/null || pip install mkdocs-material
          mkdocs gh-deploy --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
