site_name: vLLM-Omni Kanban
site_description: Daily multimodal CI health dashboard for vLLM-omni
theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - scheme: default
      primary: blue grey
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: lime
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
plugins:
  - search
nav:
  - Home: index.md
  - Models:
      - Qwen3 Omni: models/qwen3-omni.md
      - Qwen3 TTS: models/qwen3-tts.md
      - Qwen Image: models/qwen-image.md
      - Qwen Image Edit: models/qwen-image-edit.md
      - WAN 2.2: models/wan22.md
  - Alerts: alerts.md
  - Reports:
      - Archive: reports/index.md
      - 2026-03-14: reports/2026-03-14.md
      - 2026-03-13: reports/2026-03-13.md
      - 2026-03-12: reports/2026-03-12.md
      - 2026-03-11: reports/2026-03-11.md
      - 2026-03-10: reports/2026-03-10.md
      - 2026-03-09: reports/2026-03-09.md
      - 2026-03-08: reports/2026-03-08.md
      - 2026-03-07: reports/2026-03-07.md
  - Plans:
      - PRD: plans/2026-03-13-prd.md
      - Design: plans/2025-03-13-kanban-design.md
      - TDD Plan: plans/2025-03-13-tdd-plan-design.md
      - Implementation Plan: plans/2026-03-13-implementation-plan.md
  - Contributing: contributing.md
extra_javascript:
  - https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js
  - assets/js/render_charts.js
extra_css:
  - assets/stylesheets/dashboard.css
